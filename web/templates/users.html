{{define "content"}}
<nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-emerald-400 font-bold text-lg">NGINX Proxy Manager</span>
            <span class="text-gray-500 text-xs bg-gray-700 px-2 py-0.5 rounded">Users</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/" class="text-gray-400 hover:text-emerald-400 text-sm transition">Dashboard</a>
            <form method="post" action="/logout">
                <button type="submit" class="text-gray-400 hover:text-red-400 text-sm transition">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <h2 class="text-lg font-semibold mb-4">Users</h2>
            <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-gray-700/50 text-gray-400 uppercase text-xs tracking-wider">
                            <th class="px-4 py-3 text-left">ID</th>
                            <th class="px-4 py-3 text-left">Username</th>
                            <th class="px-4 py-3 text-left">Created</th>
                            <th class="px-4 py-3 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-700">
                        {{range .Users}}
                        <tr class="hover:bg-gray-700/30 transition">
                            <td class="px-4 py-3 text-gray-400 font-mono">{{.ID}}</td>
                            <td class="px-4 py-3 font-medium">{{.Username}}</td>
                            <td class="px-4 py-3 text-gray-400 text-xs">{{.CreatedAt}}</td>
                            <td class="px-4 py-3 text-right">
                                <form method="post" action="/users/{{.ID}}/delete" onsubmit="return confirm('Delete user {{.Username}}?')" class="inline">
                                    <button type="submit" class="text-red-400 hover:text-red-300 text-xs transition">Delete</button>
                                </form>
                            </td>
                        </tr>
                        {{else}}
                        <tr>
                            <td colspan="4" class="px-4 py-8 text-center text-gray-500 italic">No users</td>
                        </tr>
                        {{end}}
                    </tbody>
                </table>
            </div>
        </div>

        <div>
            <h2 class="text-lg font-semibold mb-4">Add User</h2>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-6">
                {{if .Error}}
                <div class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm">
                    {{.Error}}
                </div>
                {{end}}
                <form method="post" action="/users" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                        <input type="text" name="username" required
                            class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                        <input type="password" name="password" required minlength="6"
                            class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500">
                    </div>
                    <button type="submit"
                        class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 px-4 rounded-lg transition">
                        Create User
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>
{{end}}
