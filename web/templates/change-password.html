{{define "content"}}
<div class="flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-emerald-400">NGINX Proxy Manager</h1>
            <p class="text-gray-400 mt-2 text-sm">You must change your password before continuing</p>
        </div>
        {{if .Error}}
        <div class="bg-red-900/50 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm">
            {{.Error}}
        </div>
        {{end}}
        <form method="post" action="/change-password" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Current Password</label>
                <input type="password" name="current_password" required
                    class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">New Password</label>
                <input type="password" name="new_password" required minlength="6"
                    class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Confirm New Password</label>
                <input type="password" name="confirm_password" required minlength="6"
                    class="w-full px-4 py-2.5 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition">
            </div>
            <button type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 px-4 rounded-lg transition duration-200">
                Change Password
            </button>
        </form>
    </div>
</div>
{{end}}
