name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o "nginx-proxy-ui-${{ matrix.goos }}-${{ matrix.goarch }}$ext" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-proxy-ui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nginx-proxy-ui-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: nginx-proxy-ui-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum nginx-proxy-ui-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nginx-proxy-ui-*
            checksums.txt
          generate_release_notes: true
